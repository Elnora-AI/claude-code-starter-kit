name: install-smoke-test

# Runs setup-mac.sh and setup-windows.ps1 on real GitHub-hosted runners with
# ELNORA_SKIP_HANDOFF=1 so the script completes Phase 1 (install all tools,
# print version summary, print handoff banner) without trying to launch
# Claude — Claude can't auth on a headless runner.
#
# Caveats vs a true fresh-laptop dry run:
#   - Runners come pre-loaded with dev tools (Git, Node, Python, gh on most).
#     So most "install" steps hit the "already installed, skipping" path.
#   - No GUI: can't test browser auth, VS Code PATH cache, or Xcode CLT dialog.
#   - No corporate Group Policy, no antivirus interference.
#   - Read-Host prompts would hang; we pre-set git config to avoid one.
#   - Neither windows-2022 nor windows-2025 runners include winget by default
#     (they ship Chocolatey instead — winget runs on App Installer, a Microsoft
#     Store package only available on Win10/11 consumer SKUs, not Windows
#     Server). Real Win10/11 attendees have winget pre-installed. To test the
#     winget paths in CI we install winget via the Cyberboss/install-winget
#     action (pinned by SHA) before invoking setup-windows.ps1.
#   - Shared CI runner IP pools routinely exhaust the GitHub API's 60/hour
#     unauthenticated rate limit. setup-mac.sh and setup-windows.ps1 work
#     around this by pinning the Elnora CLI version, which bypasses the
#     installer's API-based version resolution.
#
# Trigger: workflow_dispatch (manual) + push to main when an install script
# changes. Not on PRs to keep it lightweight; trigger manually via
# `gh workflow run install-smoke-test.yml` when you want a sanity check.
#
# Security: this workflow uses no untrusted inputs (no github.event.*,
# no github.head_ref, no PR titles/bodies). Only static commands and
# pinned action versions.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "setup-mac.sh"
      - "setup-windows.ps1"
      - "install.sh"
      - "install.ps1"
      - ".github/workflows/install-smoke-test.yml"

permissions:
  contents: read

jobs:
  macos:
    name: macOS (setup-mac.sh)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Pre-set git config (skip Read prompt)
        run: |
          git config --global user.name "CI Smoke Test"
          git config --global user.email "ci@elnora-starter-kit.test"

      - name: Run setup-mac.sh with handoff skipped
        env:
          ELNORA_SKIP_HANDOFF: "1"
        run: |
          chmod +x setup-mac.sh
          bash setup-mac.sh

      - name: Show install log
        if: always()
        run: |
          echo "=== ~/claude-starter-install.log ==="
          cat "$HOME/claude-starter-install.log" || echo "(log not produced)"

      - name: Fail if any in-script step reported FAILURE
        if: always()
        run: |
          # The setup script always exits 0 (so IDE terminals don't hide the
          # remediation recap). To make this workflow a meaningful CI gate,
          # grep the install log for the FAILURE: marker the script emits in
          # its per-step failure box and fail the job if any are present.
          if [ -f "$HOME/claude-starter-install.log" ] && grep -q "FAILURE:" "$HOME/claude-starter-install.log"; then
            echo "::error::setup-mac.sh reported one or more in-step FAILURE markers (see install log above)"
            exit 1
          fi

  windows:
    name: Windows (setup-windows.ps1)
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Pre-set git config (skip Read prompt)
        shell: pwsh
        run: |
          git config --global user.name "CI Smoke Test"
          git config --global user.email "ci@elnora-starter-kit.test"

      - name: Install winget (not pre-installed on windows-* runners)
        # Pinned by SHA (v1.2.0) for security; bump SHA when upgrading.
        # Action source audited: composite action that uses Microsoft's
        # documented Add-AppxPackage flow to install winget on Windows Server.
        uses: Cyberboss/install-winget@fc922bc7e0adb16f39ceab057cb2af88bd3799e1

      - name: Run setup-windows.ps1 with handoff skipped
        shell: pwsh
        env:
          ELNORA_SKIP_HANDOFF: "1"
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          .\setup-windows.ps1

      - name: Show install log
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== claude-starter-install.log ==="
          Get-Content "$env:USERPROFILE\claude-starter-install.log" -ErrorAction SilentlyContinue

      - name: Fail if any in-script step reported FAILURE
        if: always()
        shell: pwsh
        run: |
          # See matching comment in the macOS job above.
          $logPath = "$env:USERPROFILE\claude-starter-install.log"
          if (Test-Path $logPath) {
            $log = Get-Content $logPath -Raw
            if ($log -match "FAILURE:") {
              Write-Host "::error::setup-windows.ps1 reported one or more in-step FAILURE markers (see install log above)"
              exit 1
            }
          }
